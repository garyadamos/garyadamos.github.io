<!DOCTYPE html>
<html>
  <head>
    <title>Just Do Nothing</title>
    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
        text-align: center;
      }

      h1 {
        font-size: 48px;
        font-weight: bold;
        margin-top: 50px;
      }

      .container {
        margin-top: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #start-button {
        padding: 10px;
        font-size: 24px;
        border-radius: 10px;
        border: none;
        background-color: #2196f3;
        color: #fff;
        margin-bottom: 20px;
        cursor: pointer;
      }

      #countdown {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .counter {
        font-size: 48px;
        font-weight: bold;
        margin-top: 50px;
      }

      .footer {
        position: absolute;
        bottom: 0;
        right: 0;
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #999;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Just Do Nothing</h1>
    <div class="container">
      <button id="start-button">Start</button>
      <div id="countdown"></div>
      <div id="counter" class="counter"></div>
    </div>
    <div class="footer">Created by Gary Adamos for VIS 3</div>

    <script>
      var counterInterval;

      function startCountdown() {
        var countdownEl = document.getElementById("countdown");
        countdownEl.innerText = "Don't do Anything!";

        setTimeout(function () {
          countdownEl.innerText = "3";
        }, 1000);

        setTimeout(function () {
          countdownEl.innerText = "2";
        }, 2000);

        setTimeout(function () {
          countdownEl.innerText = "1";
        }, 3000);

        setTimeout(function () {
          countdownEl.style.display = "none";
          startCounter();
        }, 4000);
      }

      function startCounter() {
        var counterEl = document.getElementById("counter");
        var count = 0;
        counterEl.innerText = count;
        counterInterval = setInterval(function () {
          count++;
          counterEl.innerText = count;
        }, 1000);
      }

      function stopCounter() {
        clearInterval(counterInterval);
      }

      document
        .getElementById("start-button")
        .addEventListener("click", function () {
          startCountdown();
        });

      document.addEventListener("mousemove", function () {
        stopCounter();
      });

      document.addEventListener("keydown", function () {
        stopCounter();
      });
    </script>
  </body>
</html>
